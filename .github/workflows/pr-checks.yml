name: Frontend CI Checks

on:
  pull_request:
    branches: [ "dev" ]

jobs:
  cypress-e2e:
    name: Run Cypress E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del frontend
        uses: actions/checkout@v4
        with:
          path: Compra-tu-Hogar-frontend

      - name: Checkout del backend
        uses: actions/checkout@v4
        with:
          repository: BautistaBracco/Compra-tu-Hogar-backend
          path: Compra-tu-Hogar-backend

      - name: Setup de Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Compra-tu-Hogar-frontend/package-lock.json

      - name: Instalar dependencias del frontend
        working-directory: Compra-tu-Hogar-frontend
        run: npm ci

      - name: Levantar MySQL y backend con Docker Compose
        working-directory: Compra-tu-Hogar-backend
        env:
          DB_NAME: backend
          DB_USER: app
          DB_PASSWORD: change_me
          DB_URL: jdbc:mysql://db:3306/backend
          MYSQL_ROOT_PASSWORD: change_me_root
          JWT_SECRET_KEY: change_me_change_me_change_me_change_me
          JWT_EXPIRATION_TIME: 3600000
        run: docker compose up -d --build db backend

      - name: Esperar al backend
        working-directory: Compra-tu-Hogar-backend
        env:
          DB_NAME: backend
          DB_USER: app
          DB_PASSWORD: change_me
          DB_URL: jdbc:mysql://db:3306/backend
          MYSQL_ROOT_PASSWORD: change_me_root
          JWT_SECRET_KEY: change_me_change_me_change_me_change_me
          JWT_EXPIRATION_TIME: 3600000
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/api/v1/health >/dev/null; then
              exit 0
            fi
            sleep 5
          done

          docker compose logs backend
          exit 1

      - name: Sembrar usuario para Cypress
        run: |
          set -e

          register_status=$(curl -s -o register-response.json -w "%{http_code}" \
            -X POST "http://localhost:8080/api/v1/auth/register" \
            -H "Content-Type: application/json" \
            -d '{"nombre":"Juan Pérez","email":"juan@gmail.com","password":"12345678"}')

          if [ "$register_status" != "201" ] && [ "$register_status" != "409" ]; then
            cat register-response.json
            exit 1
          fi

          login_status=$(curl -s -o login-response.json -w "%{http_code}" \
            -X POST "http://localhost:8080/api/v1/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"juan@gmail.com","password":"12345678"}')

          if [ "$login_status" != "200" ]; then
            cat login-response.json
            exit 1
          fi
        working-directory: Compra-tu-Hogar-backend
        env:
          DB_NAME: backend
          DB_USER: app
          DB_PASSWORD: change_me
          DB_URL: jdbc:mysql://db:3306/backend
          MYSQL_ROOT_PASSWORD: change_me_root
          JWT_SECRET_KEY: change_me_change_me_change_me_change_me
          JWT_EXPIRATION_TIME: 3600000

      - name: Levantar el frontend con Docker Compose
        working-directory: Compra-tu-Hogar-backend
        env:
          DB_NAME: backend
          DB_USER: app
          DB_PASSWORD: change_me
          DB_URL: jdbc:mysql://db:3306/backend
          MYSQL_ROOT_PASSWORD: change_me_root
          JWT_SECRET_KEY: change_me_change_me_change_me_change_me
          JWT_EXPIRATION_TIME: 3600000
        run: docker compose up -d --build frontend

      - name: Esperar al frontend
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:5173 >/dev/null; then
              exit 0
            fi
            sleep 5
          done

          docker compose -f Compra-tu-Hogar-backend/docker-compose.yml logs frontend
          exit 1

      - name: Ejecutar Cypress
        working-directory: Compra-tu-Hogar-frontend
        run: npx cypress run --browser electron

      - name: Subir artefactos de Cypress
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-artifacts
          path: |
            Compra-tu-Hogar-frontend/cypress/screenshots/
            Compra-tu-Hogar-frontend/cypress/videos/

      - name: Ejecutar SonarCloud
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        with:
           projectBaseDir: Compra-tu-Hogar-frontend
           args: >
             -Dsonar.projectKey=BautistaBracco_Compra-tu-Hogar-frontend
             -Dsonar.organization=bautistabracco
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}